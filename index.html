<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備日常檢點系統 (完美直書版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            @page { size: landscape; margin: 0.5cm; }
            .report-table th, .report-table td {
                border: 1.5px solid #000000 !important;
                color: #000000 !important;
            }
        }
        .report-table th, .report-table td {
            border: 1.5px solid #000000;
            padding: 4px;
            text-align: center;
            font-size: 11px;
            color: #000000;
        }
        #sig-modal-canvas {
            border: 2px dashed #000000;
            background-color: #ffffff;
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6">

    <!-- ==================== 1. 前端輸入與操作介面 ==================== -->
    <div class="max-w-7xl mx-auto no-print">
        <h1 class="text-3xl font-bold mb-6 text-blue-900 text-center">⚙️ 設備日常點檢系統 (直書清晰版)</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <!-- 填寫點檢表單 -->
            <div class="bg-white p-6 rounded-lg shadow-md lg:col-span-1 border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">📋 每日點檢登錄</h2>
                <form id="inspectionForm" onsubmit="saveRecord(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">選擇設備類型</label>
                        <select id="equipType" class="w-full border-gray-300 border p-2 rounded" onchange="loadQuestions()">
                            <option value="crane">固定式起重機</option>
                            <option value="forklift">堆高機</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">點檢日期</label>
                        <input type="date" id="inspectDate" class="w-full border-gray-300 border p-2 rounded" required>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-800 mb-2">點檢項目結果</label>
                        <div id="dynamicItems" class="space-y-3 max-h-60 overflow-y-auto pr-1"></div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">記事/異常說明</label>
                        <textarea id="remark" class="w-full border-gray-300 border p-2 rounded h-16 text-sm" placeholder="若有異常請說明"></textarea>
                    </div>

                    <!-- 手寫簽名區 -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-800 mb-1">✍️ 檢點人員手寫簽名 (請直書書寫)</label>
                        <button type="button" onclick="openSignatureModal()" class="w-full py-3 px-4 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg shadow flex items-center justify-center gap-2 transition mb-2">
                            <span>📝 點擊此處「開啟全螢幕手寫簽名」</span>
                        </button>

                        <div id="sig-preview-container" class="hidden border border-gray-300 rounded p-2 bg-gray-50 flex flex-col items-center">
                            <p class="text-xs text-green-700 font-bold mb-1">✓ 已完成手寫簽名（預覽如下）：</p>
                            <img id="sig-preview-img" class="max-h-20 border bg-white object-contain" src="">
                            <button type="button" onclick="openSignatureModal()" class="text-xs text-blue-600 underline mt-1">重新簽名</button>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-2 px-4 rounded transition">
                        儲存今日紀錄並簽名
                    </button>
                </form>
            </div>

            <!-- 報表查詢與控制面板 -->
            <div class="bg-white p-6 rounded-lg shadow-md lg:col-span-2 border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">📊 報表查詢與匯出</h2>
                <div class="flex flex-wrap gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-gray-600">查詢月份</label>
                        <input type="month" id="filterMonth" class="border p-2 rounded" onchange="generateReport()">
                    </div>
                    <div class="flex items-end">
                        <button onclick="window.print()" class="bg-green-700 hover:bg-green-800 text-white font-bold py-2 px-4 rounded transition">
                            🖨️ 預覽並列印 / 存為 PDF
                        </button>
                    </div>
                    <div class="flex items-end">
                        <button onclick="clearAllData()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-1 px-3 rounded text-xs transition">
                            ⚠️ 清空測試紀錄
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 2. 月報表輸出區 ==================== -->
    <div id="printReportArea" class="bg-white p-6 rounded shadow-lg max-w-7xl mx-auto print-area border border-black">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold tracking-widest text-black" id="reportTitle">固定式起重機日常檢點表</h1>
        </div>

        <div class="grid grid-cols-4 gap-2 text-sm mb-2 font-mono text-black">
            <div><strong>機械編號：</strong> <span id="info_machNo" class="font-bold">AC011/AC020</span></div>
            <div><strong>位置：</strong> <span id="info_location" class="font-bold">第二棟北</span></div>
            <div><strong>單位主管：</strong> <span class="border-2 border-black px-2 py-0.5 font-bold" id="info_manager">吳政軒</span></div>
            <div><strong>檢查月份：</strong> <span id="info_month" class="underline font-bold">115 年 07 月</span></div>
        </div>

        <table class="w-full report-table font-sans">
            <thead>
                <tr class="bg-gray-100">
                    <th rowspan="2" class="w-48 text-xs text-black font-bold">檢點項目</th>
                    <th colspan="31" class="text-xs py-0.5 text-black font-bold">檢點結果 (日期)</th>
                </tr>
                <tr class="bg-gray-100" id="dayHeader"></tr>
            </thead>
            <tbody id="reportRows"></tbody>
            <tfoot>
                <tr>
                    <td class="text-left font-bold text-xs text-black" style="height: 40px; vertical-align: top;">8. 記事</td>
                    <td colspan="31" class="text-left px-2 text-xs text-black font-bold" id="reportNotes" style="vertical-align: top;"></td>
                </tr>
                <tr>
                    <td class="font-bold text-xs text-black" style="height: 120px;">檢點人員簽名</td>
                    <td colspan="31" class="p-0">
                        <table class="w-full h-full text-center table-fixed" style="border: none; border-collapse: collapse;">
                            <tr id="signatureRow" class="h-[120px]"></tr>
                        </table>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- ==================== 3. 全螢幕彈出式手寫視窗 (Modal) ==================== -->
    <div id="sigModal" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex flex-col justify-between p-4 hidden no-print">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg mx-auto overflow-hidden flex flex-col h-[90vh]">
            <div class="bg-gray-100 p-3 border-b flex justify-between items-center">
                <span class="font-bold text-gray-800">✍️ 檢點人員手寫簽名 (請「由上往下」直寫您的名字)</span>
                <button type="button" onclick="closeSignatureModal()" class="text-gray-500 hover:text-gray-700 text-xl font-bold">✕</button>
            </div>
            <div class="flex-1 bg-gray-50 p-4 flex items-center justify-center relative">
                <canvas id="sig-modal-canvas" class="w-full h-full rounded shadow-inner"></canvas>
            </div>
            <div class="bg-gray-100 p-3 border-t flex gap-3">
                <button type="button" onclick="clearModalCanvas()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded">重畫</button>
                <button type="button" onclick="confirmSignature()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded text-lg">確認簽名</button>
            </div>
        </div>
    </div>

    <!-- ==================== 4. JavaScript 邏輯 ==================== -->
    <script {nonce}>
        const equipmentData = {
            crane: {
                title: "固定式起重機日常檢點表",
                machNo: "AC011/AC020",
                location: "第二棟北",
                manager: "吳政軒",
                items: [
                    "1. 過捲預防裝置動作狀況正常",
                    "2. 走行警報裝置動作狀況正常 (遙控器操作者)",
                    "3. 制動器及離合器動作正常",
                    "4. 鋼索 (或吊鏈) 運行正常",
                    "5. 吊鉤機能正常",
                    "6. 控制裝置性能正常",
                    "7. 直、橫行軌道正常"
                ]
            },
            forklift: {
                title: "堆高機每日安全點檢表",
                machNo: "FL-008 / FL-009",
                location: "第一棟成品倉庫",
                manager: "吳政軒",
                items: [
                    "1. 制動液量及煞車效能正常",
                    "2. 輪胎氣壓及磨損狀況正常",
                    "3. 液壓油量及各油路有無漏油",
                    "4. 貨叉及鏈條有無變形或損傷",
                    "5. 方向燈、大燈及後照鏡正常",
                    "6. 喇叭及倒車警報器功能正常"
                ]
            }
        };

        let mCanvas, mCtx, mDrawing = false, tempSignatureBase64 = "";

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inspectDate').value = today;
            document.getElementById('filterMonth').value = today.slice(0, 7);
            initModalCanvas();
            buildDayHeader();
            loadQuestions();
            generateReport();
        };

        function initModalCanvas() {
            mCanvas = document.getElementById('sig-modal-canvas');
            if (!mCanvas) return;
            mCtx = mCanvas.getContext('2d');
            resizeCanvas();

            function getCoords(clientX, clientY) {
                const rect = mCanvas.getBoundingClientRect();
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            mCanvas.addEventListener("mousedown", (e) => { mDrawing = true; const pos = getCoords(e.clientX, e.clientY); mCtx.beginPath(); mCtx.moveTo(pos.x, pos.y); });
            mCanvas.addEventListener("mouseup", () => mDrawing = false);
            mCanvas.addEventListener("mousemove", (e) => {
                if (!mDrawing) return;
                const pos = getCoords(e.clientX, e.clientY);
                mCtx.lineTo(pos.x, pos.y);
                mCtx.stroke();
            });

            mCanvas.addEventListener("touchstart", (e) => {
                mDrawing = true; const pos = getCoords(e.touches[0].clientX, e.touches[0].clientY);
                mCtx.beginPath(); mCtx.moveTo(pos.x, pos.y); e.preventDefault();
            }, { passive: false });
            mCanvas.addEventListener("touchend", () => mDrawing = false);
            mCanvas.addEventListener("touchmove", (e) => {
                if (!mDrawing) return;
                const pos = getCoords(e.touches[0].clientX, e.touches[0].clientY);
                mCtx.lineTo(pos.x, pos.y); mCtx.stroke(); e.preventDefault();
            }, { passive: false });
        }

        function resizeCanvas() {
            if (!mCanvas || !mCtx) return;
            const rect = mCanvas.getBoundingClientRect();
            mCanvas.width = rect.width;
            mCanvas.height = rect.height;
            mCtx.strokeStyle = "#000000";
            mCtx.lineWidth = 5; 
            mCtx.lineCap = "round";
            mCtx.lineJoin = "round";
        }

        function openSignatureModal() {
            document.getElementById('sigModal').classList.remove('hidden');
            setTimeout(() => { resizeCanvas(); clearModalCanvas(); }, 100);
        }
        function closeSignatureModal() { document.getElementById('sigModal').classList.add('hidden'); }
        function clearModalCanvas() { if (mCtx && mCanvas) mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height); }

        function confirmSignature() {
            if (!mCanvas) return;
            tempSignatureBase64 = mCanvas.toDataURL();
            document.getElementById('sig-preview-img').src = tempSignatureBase64;
            document.getElementById('sig-preview-container').classList.remove('hidden');
            closeSignatureModal();
        }

        function buildDayHeader() {
            const header = document.getElementById('dayHeader');
            header.innerHTML = '';
            for (let i = 1; i <= 31; i++) {
                header.innerHTML += `<th class="w-6 text-[10px] text-black font-bold" style="border: 1.5px solid #000000;">${i}</th>`;
            }
        }

        function loadQuestions() {
            const type = document.getElementById('equipType').value;
            const container = document.getElementById('dynamicItems');
            container.innerHTML = '';
            equipmentData[type].items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="p-2 border rounded bg-gray-50 border-gray-300 text-xs">
                        <p class="font-semibold mb-1">${item}</p>
                        <div class="flex gap-4">
                            <label class="inline-flex items-center"><input type="radio" name="item_${index}" value="V" checked><span class="ml-1 font-bold">V 良好</span></label>
                            <label class="inline-flex items-center"><input type="radio" name="item_${index}" value="/"><span class="ml-1 font-bold">/ 無</span></label>
                            <label class="inline-flex items-center"><input type="radio" name="item_${index}" value="X"><span class="ml-1 font-bold">X 不良</span></label>
                        </div>
                    </div>`;
            });
            generateReport();
        }

        // ⭐ 核心升級：精準直書去白邊，保留原樣，放大 3 倍維持高清！
        function cropPureSignature(base64Str, callback) {
            const img = new Image();
            img.src = base64Str;
            img.onload = function() {
                const calcCanvas = document.createElement('canvas');
                calcCanvas.width = img.width;
                calcCanvas.height = img.height;
                const cCtx = calcCanvas.getContext('2d');
                cCtx.drawImage(img, 0, 0);

                const imgData = cCtx.getImageData(0, 0, calcCanvas.width, calcCanvas.height);
                const data = imgData.data;
                let minX = calcCanvas.width, maxX = 0, minY = calcCanvas.height, maxY = 0;
                let found = false;

                for (let y = 0; y < calcCanvas.height; y++) {
                    for (let x = 0; x < calcCanvas.width; x++) {
                        const alpha = data[(y * calcCanvas.width + x) * 4 + 3];
                        if (alpha > 10) {
                            found = true;
                            if (x < minX) minX = x; if (x > maxX) maxX = x;
                            if (y < minY) minY = y; if (y > maxY) maxY = y;
                        }
                    }
                }

                if (!found) { minX = 0; maxX = img.width; minY = 0; maxY = img.height; }

                const padding = 10; // 保留合適的邊緣距離
                minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
                maxX = Math.min(img.width, maxX + padding); maxY = Math.min(img.height, maxY + padding);

                const w = maxX - minX;
                const h = maxY - minY;

                // 創建 3 倍高解析度的輸出畫布
                const outCanvas = document.createElement('canvas');
                outCanvas.width = w * 3;
                outCanvas.height = h * 3;
                const oCtx = outCanvas.getContext('2d');

                oCtx.imageSmoothingEnabled = true;
                oCtx.imageSmoothingQuality = 'high';
                oCtx.scale(3, 3); // 放大 3 倍渲染，確保字跡圓滑清晰

                // 直接繪製裁切區塊，不作任何角度旋轉
                oCtx.drawImage(img, minX, minY, w, h, 0, 0, w, h);
                callback(outCanvas.toDataURL('image/png'));
            };
        }

        function saveRecord(e) {
            e.preventDefault();
            const type = document.getElementById('equipType').value;
            const dateStr = document.getElementById('inspectDate').value;
            if (!tempSignatureBase64) { alert("⚠️ 請先完成手寫簽名！"); return; }

            cropPureSignature(tempSignatureBase64, function(finalSignature) {
                const results = [];
                equipmentData[type].items.forEach((_, index) => {
                    const radio = document.querySelector(`input[name="item_${index}"]:checked`);
                    results.push(radio ? radio.value : 'V');
                });

                let allRecords = [];
                try { const stored = localStorage.getItem('equipment_records'); if (stored) allRecords = JSON.parse(stored); } catch (e) {}
                allRecords = allRecords.filter(r => !(r.type === type && r.date === dateStr));
                allRecords.push({ type, date: dateStr, results, remark: document.getElementById('remark').value, signature: finalSignature });
                
                localStorage.setItem('equipment_records', JSON.stringify(allRecords));
                alert('🎉 儲存成功！簽名已套用「完美直立大字」模式！');
                document.getElementById('sig-preview-container').classList.add('hidden');
                tempSignatureBase64 = "";
                generateReport();
            });
        }

        function generateReport() {
            const type = document.getElementById('equipType').value;
            const filterMonth = document.getElementById('filterMonth').value;
            if (!filterMonth) return;

            const meta = equipmentData[type];
            document.getElementById('reportTitle').innerText = meta.title;
            document.getElementById('info_machNo').innerText = meta.machNo;
            document.getElementById('info_location').innerText = meta.location;
            document.getElementById('info_manager').innerText = meta.manager;

            const year = parseInt(filterMonth.split('-')[0]);
            document.getElementById('info_month').innerText = `${year - 1911} 年 ${filterMonth.split('-')[1]} 月`;

            let allRecords = [];
            try { const stored = localStorage.getItem('equipment_records'); if (stored) allRecords = JSON.parse(stored); } catch (e) {}
            const currentMonthRecords = allRecords.filter(r => r.type === type && r.date.startsWith(filterMonth));

            const tbody = document.getElementById('reportRows');
            tbody.innerHTML = '';
            meta.items.forEach((itemText, itemIdx) => {
                let rowHtml = `<tr><td class="text-left font-bold text-xs py-1 px-2 text-black" style="border: 1.5px solid #000000;">${itemText}</td>`;
                for (let day = 1; day <= 31; day++) {
                    const rec = currentMonthRecords.find(r => parseInt(r.date.slice(8,10)) === day);
                    rowHtml += `<td class="w-6 text-center text-black font-black text-xs" style="border: 1.5px solid #000000;">${rec ? rec.results[itemIdx] : ''}</td>`;
                }
                tbody.innerHTML += rowHtml + '</tr>';
            });

            document.getElementById('reportNotes').innerText = currentMonthRecords.filter(r => r.remark).map(r => `[${r.date.slice(8,10)}日] ${r.remark}`).join('；') || "良好無異狀。";

            const sigRow = document.getElementById('signatureRow');
            sigRow.innerHTML = '';
            for (let day = 1; day <= 31; day++) {
                const rec = currentMonthRecords.find(r => parseInt(r.date.slice(8,10)) === day);
                if (rec && rec.signature) {
                    // ⭐ 移除所有轉向標籤，配合 object-fit: contain，讓您的手寫字自然漂亮地頂天立地撐滿！
                    sigRow.innerHTML += `
                        <td class="w-6 h-[120px] p-[2px] align-middle" style="border: 1.5px solid #000000; background: #ffffff;">
                            <img src="${rec.signature}" class="w-full h-full mx-auto" style="object-fit: contain; filter: contrast(3) brightness(0.2); display: block;">
                        </td>`;
                } else {
                    sigRow.innerHTML += `<td class="w-6 h-[120px]" style="border: 1.5px solid #000000;"></td>`;
                }
            }
        }

        function clearAllData() {
            if (confirm('⚠️ 確定要清空所有紀錄嗎？')) { localStorage.removeItem('equipment_records'); generateReport(); }
        }
    </script>
</body>
</html>
